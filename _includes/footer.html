{% include base_path %}

<div class="page__footer-follow">
  <ul class="social-icons">
    <li><strong>Follow:</strong></li>
    {% if site.author.github %}
      <li><a href="http://github.com/{{ site.author.github }}"><i class="fab fa-github" aria-hidden="true"></i> GitHub</a></li>
    {% endif %}
  </ul>
</div>

<div class="page__footer-copyright">
  {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}, Powered by <a href="http://jekyllrb.com" rel="nofollow">Jekyll</a><br>
</div>
