# Basic Site Settings
locale              : "en-US"
title               : "Jaeho Cho"
title_separator     : "-"
name                : &name "Jaeho Cho"
description         : &description "Electrical Engineering"
url                 : https://jaehho.github.io
baseurl             : ""
repository          : "jaehho/jaehho.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
author:
  # Biographic information
  avatar            : "headshot.JPG"
  name              : *name
  bio               : *description
  location          : "NYC"
  employer          : "The Cooper Union"
  employer_url      : "https://www.cooper.edu"
  uri               : 
  email             : "jaeho2025@gmail.com" 
  github            : "jaehho"
  linkedin          : "jaeho-cho"

# Site Settings
breadcrumbs         : false # true, false (default)
image_path          : "/assets/images/"
navigation:
  - title: "Portfolio"
    url: /portfolio/
  - title: "CV"
    url: /cv/

# Analytics
analytics:
  google:
    tracking_id     : "G-4VWP819GLG"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  # Project Documentation & Licensing Files
  - README
  - CHANGELOG
  - LICENSE

  # Dependency & Build System Files
  - Gemfile
  - Gemfile.lock
  - package.json*
  - Rakefile
  - Makefile
  - Capfile
  - Gruntfile.js
  - gulpfile.js

  # Development & Temporary Files
  - tmp
  - log
  - local
  - .bundle
  - .asset-cache
  - .jekyll-assets-cache
  - .sass-cache

  # Editor & Workspace Files
  - "*.sublime-project"
  - "*.sublime-workspace"

  # Source Code & Configuration Files
  - config
  - Dockerfile

  # Jekyll Build & Third-party Libraries
  - vendor/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

  # JavaScript & Asset Files
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor

keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: true

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# These settings control the types of collections used by the template
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# These settings control how pages and collections are included in the site
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
timezone: America/New_York

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
